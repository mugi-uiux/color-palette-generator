<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <iframe id="app-frame" src="https://color-palette-generator-rose.vercel.app/?app=figma"></iframe>
    <script>
        // Webアプリからのメッセージを受け取ってFigmaに転送
        window.addEventListener('message', (event) => {
            // セキュリティチェック: 信頼できるオリジンからのメッセージか確認
            if (event.origin !== "https://color-palette-generator-rose.vercel.app") {
                return;
            }

            // Figmaにメッセージを転送
            // pluginMessageプロパティがある場合はそれをそのまま転送
            if (event.data.pluginMessage) {
                parent.postMessage({ pluginMessage: event.data.pluginMessage }, '*');
            }
        });

        // Figmaからのメッセージを受け取ってWebアプリに転送
        // Figma -> UI のメッセージハンドリング
        onmessage = (event) => {
            const iframe = document.getElementById('app-frame');
            if (!iframe || !iframe.contentWindow) return;

            const pluginMessage = event.data && event.data.pluginMessage;

            // フレーム画像のバイト列はブラウザ側でDataURLに変換してから転送
            if (pluginMessage && pluginMessage.type === 'load-frame-image' && pluginMessage.bytes) {
                const blob = new Blob([new Uint8Array(pluginMessage.bytes)], { type: 'image/png' });
                const reader = new FileReader();
                reader.onloadend = function() {
                    iframe.contentWindow.postMessage(
                        { pluginMessage: { type: 'load-frame-image', dataUrl: reader.result } },
                        'https://color-palette-generator-rose.vercel.app'
                    );
                };
                reader.readAsDataURL(blob);
            } else {
                // その他のメッセージはそのまま転送
                iframe.contentWindow.postMessage(event.data, 'https://color-palette-generator-rose.vercel.app');
            }
        };
    </script>
</body>

</html>
